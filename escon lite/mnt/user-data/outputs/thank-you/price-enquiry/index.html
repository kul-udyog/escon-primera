<style>
:root{
  --pine:        #1F3D3D;
  --pine-soft:   #2A4D4D;
  --ivory:       #FAFAF8;
  --ivory-dim:   #EFF0EC;
  --brass:       #E08A37;
  --brass-soft:  #EDA763;
  --moss:        #4FA3A0;
  --moss-soft:   #6BB8B5;
  --stone:       #8A9694;
  --stone-line:  rgba(79,163,160,0.28);
  --radius:      2px;
  --ease:        cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;}
body{
  background:var(--ivory);
  color:var(--pine);
  font-family:'Inter',sans-serif;
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
h1,.font-display{font-family:'Cormorant',serif;}
.ty-header{
  padding:1.4rem 1.5rem;
  text-align:center;
  border-bottom:1px solid var(--stone-line);
}
.ty-logo{height:42px;}
.ty-main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2.5rem 1.2rem;
}
.ty-card{
  max-width:480px;
  width:100%;
  text-align:center;
  animation:tyPopIn .4s var(--ease);
}
.ty-check{
  width:78px;height:78px;border-radius:50%;
  background:var(--moss);color:var(--ivory);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.4rem;font-size:2.3rem;
}
.ty-card h1{font-size:2.3rem;margin-bottom:0.7rem;}
.ty-card p{color:var(--stone);font-size:1.02rem;line-height:1.6;margin-bottom:2rem;}
.ty-actions{display:flex;flex-direction:column;gap:0.75rem;}
.btn-brass{
  background:var(--brass);border:none;color:var(--ivory);
  font-weight:600;border-radius:var(--radius);
  padding:0.85rem 1.2rem;text-decoration:none;display:inline-block;
  transition:background .2s var(--ease);
}
.btn-brass:hover{background:var(--brass-soft);color:var(--ivory);}
.btn-outline-ty{
  background:transparent;border:1px solid var(--stone-line);color:var(--pine);
  font-weight:600;border-radius:var(--radius);
  padding:0.85rem 1.2rem;text-decoration:none;display:inline-block;
}
.ty-footer{
  text-align:center;padding:1.2rem;font-size:0.78rem;color:var(--stone);
  border-top:1px solid var(--stone-line);
}
@keyframes tyPopIn{from{opacity:0;transform:scale(.94) translateY(12px);}to{opacity:1;transform:scale(1) translateY(0);}}
</style>
</head>

    <div class="ty-actions">

  // Personalize with first name if present in URL (?name=Rahul)

    var params = new URLSearchParams(window.location.search);
    var name = params.get('name');

      name = name.replace(/[^a-zA-Z\s'-]/g,'').trim();
      if (name) {
        document.getElementById('tyHeading').textContent = 'Thank You, ' + name + '!';
      }
    }
  })();
